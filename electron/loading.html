<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Hotel360</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #0f172a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  }
  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .logo {
    width: 72px;
    height: 72px;
    border-radius: 16px;
    background: #2563eb;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 32px;
    font-weight: 700;
  }
  .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid rgba(255,255,255,0.15);
    border-top-color: #2563eb;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .label {
    color: #94a3b8;
    font-size: 13px;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">H</div>
    <div class="spinner"></div>
    <div class="label">Iniciando Hotel360...</div>
  </div>
</body>
</html>
