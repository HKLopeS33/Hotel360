<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Fundo com gradiente azul -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="building" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="256" height="256" rx="48" ry="48" fill="url(#bg)"/>

  <!-- Sombra do prédio -->
  <rect x="62" y="200" width="132" height="6" rx="3" fill="#1e3a8a" opacity="0.4"/>

  <!-- Prédio principal -->
  <rect x="68" y="90" width="120" height="116" rx="4" fill="url(#building)"/>

  <!-- Topo triangular / telhado -->
  <polygon points="128,42 58,94 198,94" fill="#ffffff"/>
  <polygon points="128,52 68,94 188,94" fill="#dbeafe"/>

  <!-- Janelas - linha 1 -->
  <rect x="88" y="108" width="20" height="18" rx="2" fill="#3b82f6" opacity="0.8"/>
  <rect x="118" y="108" width="20" height="18" rx="2" fill="#3b82f6" opacity="0.8"/>
  <rect x="148" y="108" width="20" height="18" rx="2" fill="#3b82f6" opacity="0.8"/>

  <!-- Janelas - linha 2 -->
  <rect x="88" y="138" width="20" height="18" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="118" y="138" width="20" height="18" rx="2" fill="#60a5fa" opacity="0.9"/>
  <rect x="148" y="138" width="20" height="18" rx="2" fill="#3b82f6" opacity="0.6"/>

  <!-- Porta -->
  <rect x="108" y="168" width="40" height="38" rx="3" fill="#1e40af"/>
  <rect x="114" y="174" width="12" height="16" rx="2" fill="#93c5fd"/>
  <rect x="130" y="174" width="12" height="16" rx="2" fill="#93c5fd"/>
  <!-- Maçaneta -->
  <circle cx="126" cy="188" r="2.5" fill="#fbbf24"/>

  <!-- Linha do chão -->
  <rect x="48" y="206" width="160" height="4" rx="2" fill="#1e40af" opacity="0.5"/>

  <!-- Letra H360 embaixo -->
  <text x="128" y="240" font-family="Arial, sans-serif" font-weight="800" font-size="18" fill="#93c5fd" text-anchor="middle" letter-spacing="1">H360</text>
</svg>
